# ============================================================
# Maestro 配置文件
# 复制此文件为 config.yaml（或 ~/.maestro/config.yaml）并填入你的配置
# 支持 ${ENV_VAR} 语法引用环境变量
# ============================================================

# ============================================================
# Manager Agent 配置（外层决策 AI）
# ============================================================
manager:
  # 可选: openai | anthropic | deepseek | gemini | ollama | azure
  # 也可以是任何兼容 OpenAI 协议的服务（需配合 base_url）
  provider: deepseek

  # 对应 provider 的模型名
  model: deepseek-chat

  # API Key（建议用环境变量）
  api_key: ${DEEPSEEK_API_KEY}

  # 自定义 base_url（兼容 OpenAI 协议的服务都可以填这里）
  # 常见 provider 会自动设置，无需手动填写：
  #   deepseek → https://api.deepseek.com
  #   ollama   → http://localhost:11434/v1
  #   gemini   → https://generativelanguage.googleapis.com/v1beta/openai/
  # base_url: https://api.deepseek.com

  # 最大对话轮数（防止死循环）
  max_turns: 30

  # 单任务费用上限（美元）
  max_budget_usd: 5.0

  # 单次 LLM 请求超时（秒）
  request_timeout: 60

  # 失败重试次数
  retry_count: 3

  # Manager 系统提示（可自定义，留空则使用内置默认 prompt）
  # 默认 prompt 要求 Manager 以 JSON 格式回复决策
  # system_prompt: |
  #   你是资深工程师助手...

  # ---- Prompt 外置化配置 ----

  # System prompt 文件路径（优先于上面的 system_prompt 内联字符串）
  # 支持绝对路径或相对于工作目录的相对路径
  # 文件不存在时会自动生成默认内容
  # 修改文件后下次 decide() 调用自动生效（热加载），无需重启
  # system_prompt_file: prompts/system.md

  # 任务问答 prompt 文件路径（用于 /chat 命令的上下文问答）
  # chat_prompt_file: prompts/chat.md

  # 自由聊天 prompt 文件路径（用于无任务上下文的聊天）
  # free_chat_prompt_file: prompts/free_chat.md

  # 决策风格: default | conservative | aggressive
  # default     — 使用 prompt 文件中的原文（默认）
  # conservative — 保守模式，多确认、遇到不确定就 ask_user
  # aggressive   — 激进模式，大胆推进、减少确认
  # 也可以直接在 prompt 文件中自定义决策原则
  # decision_style: default

# ============================================================
# 编码工具配置（多工具预设 + 运行时切换）
# 支持 Claude Code、Codex CLI、Gemini CLI、Aider 等任何 CLI 编码工具
# 可配置多个工具预设，通过 `maestro switch` 命令或 Telegram /switch 切换
# ============================================================
coding_tools:
  # 当前激活的工具（对应 presets 中的 key）
  active_tool: claude

  # 工具预设（可配置多个，按需启用）
  presets:
    # ---- Claude Code ----
    claude:
      # 工具类型:
      #   claude  — Claude Code 专用模式（JSON 输出、会话恢复、费用追踪）
      #   codex   — Codex CLI 专用模式（JSONL 事件流、会话恢复、费用估算）
      #   generic — 通用模式（适配任何 CLI 工具，stdout 作为输出）
      type: claude
      command: claude
      auto_approve: true       # --dangerously-skip-permissions
      timeout: 600

    # ---- Codex CLI（取消注释启用） ----
    # codex:
    #   type: codex
    #   command: codex
    #   auto_approve: true     # --full-auto
    #   timeout: 600
    #   sandbox: net-disabled  # 沙箱级别: full | net-disabled | off
    #   model: ""              # 模型名: codex-mini-latest | o3 | o4-mini（留空用默认）
    #   skip_git_check: false

    # ---- Gemini CLI（取消注释启用） ----
    # gemini:
    #   type: generic
    #   command: gemini
    #   extra_args: ["--message"]
    #   timeout: 600

    # ---- Aider（取消注释启用） ----
    # aider:
    #   type: generic
    #   command: aider
    #   extra_args: ["--message"]
    #   timeout: 600

# 旧格式 coding_tool: 仍可兼容（自动转换为单工具 presets）

# ============================================================
# 上下文管理配置
# ============================================================
context:
  # 传给 Manager 的最近轮数（超出的轮次会被压缩为摘要）
  max_recent_turns: 5

  # 编码工具输出截断长度（字符）
  # 超出后保留 1/3 头部 + 2/3 尾部
  max_result_chars: 3000

# ============================================================
# 安全控制配置
# ============================================================
safety:
  # 死循环检测：连续 N 次相同指令触发熔断
  max_consecutive_similar: 3

  # 最大并行任务数（VPS 2GB 建议 2-3）
  max_parallel_tasks: 3

  # ---- 多维度死循环检测（增强） ----

  # 指令语义相似度阈值（0-1，越高越严格，越容易触发）
  # 当连续 N 轮指令相似度超过此值时触发熔断
  # similarity_threshold: 0.85

  # 输出停滞检测阈值（0-1，越高越严格）
  # 当连续 N 轮工具输出相似度超过此值时触发熔断
  # stagnation_threshold: 0.9

  # 连续相同错误上限
  # 编码工具连续 N 轮产出相同错误信息时触发熔断
  # max_consecutive_errors: 3

  # action 震荡检测窗口
  # 在最近 N 次 action 中检测 execute↔retry 等周期性模式
  # oscillation_window: 6

# ============================================================
# Telegram Bot 配置（远程控制）
# 设为 enabled: false 可禁用
# ============================================================
telegram:
  enabled: false

  # Bot Token（从 @BotFather 获取）
  bot_token: ${TELEGRAM_BOT_TOKEN}

  # 授权用户的 chat_id（从 @userinfobot 获取）
  chat_id: ${TELEGRAM_CHAT_ID}

  # ASK_USER 等待用户回复的超时（秒）
  ask_user_timeout: 3600

# ============================================================
# 日志配置
# ============================================================
logging:
  # 日志目录
  dir: ~/.maestro/logs

  # 日志级别: DEBUG | INFO | WARNING | ERROR
  level: INFO

  # 日志保留天数（超期自动清理）
  max_days: 30
